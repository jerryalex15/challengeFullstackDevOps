server:
  port: ${SERVER_PORT:8080}

spring:
  main:
    allow-bean-definition-overriding: true

  application:
    name: auth-service

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true

# ===============================
# JWT CONFIGURATION
# ===============================

jwt:
  access-expiration: 3600000        # 1h en ms
  refresh-expiration: 86400000     # 1j en ms
  private-key-path:
  public-key-path:
