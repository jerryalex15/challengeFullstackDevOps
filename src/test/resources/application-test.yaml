server:
  port: ${SERVER_PORT:8080}

spring:
  main:
    allow-bean-definition-overriding: true

  application:
    name: auth-service

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true

# ===============================
# JWT CONFIGURATION
# ===============================

JWT_ACCESS_EXPIRATION: 3600000
JWT_REFRESH_EXPIRATION: 86400000
